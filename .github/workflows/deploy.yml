name: Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: 'Profile to deploy (ml or se)'
        required: true
        default: 'ml'
        type: choice
        options:
          - ml
          - se

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          REACT_APP_PROFILE: ${{ github.event.inputs.profile || 'ml' }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
